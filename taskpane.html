
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formula Auditor</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", sans-serif;
      font-size: 13px;
      background: #fff;
      color: #1f1f1f;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #header {
      background: #217346;
      color: white;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #header h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.3px; }
    #close-btn {
      background: none; border: none; color: white;
      font-size: 18px; cursor: pointer; line-height: 1;
      opacity: 0.8;
    }
    #close-btn:hover { opacity: 1; }

    #cell-label {
      font-size: 11px;
      color: #888;
      padding: 8px 14px 2px;
      flex-shrink: 0;
    }

    #formula-box {
      background: #f4f4f4;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin: 0 12px 10px;
      padding: 8px 10px;
      font-family: "Cascadia Code", "Consolas", monospace;
      font-size: 12px;
      color: #0a3622;
      word-break: break-all;
      min-height: 38px;
      flex-shrink: 0;
    }

    #refs-label {
      font-size: 11px;
      color: #888;
      padding: 0 14px 4px;
      flex-shrink: 0;
    }

    #no-formula {
      text-align: center;
      color: #999;
      padding: 30px 20px;
      font-size: 12px;
      display: none;
    }

    #refs-list {
      flex: 1;
      overflow-y: auto;
      margin: 0 12px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
    }

    .ref-item {
      display: flex;
      align-items: center;
      padding: 7px 10px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.1s;
      outline: none;
    }
    .ref-item:last-child { border-bottom: none; }
    .ref-item:hover { background: #f0f7f3; }
    .ref-item.active {
      background: #d6eedd;
      font-weight: 600;
      color: #155724;
    }

    .ref-icon {
      width: 18px;
      height: 18px;
      margin-right: 8px;
      background: #217346;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ref-icon svg { width: 10px; height: 10px; fill: white; }

    .ref-addr { font-family: "Cascadia Code", "Consolas", monospace; }
    .ref-sheet { font-size: 10px; color: #888; margin-left: auto; padding-left: 8px; }

    #hint {
      font-size: 10px;
      color: #aaa;
      text-align: center;
      padding: 6px;
      border-top: 1px solid #f0f0f0;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div id="header">
    <button id="back-btn" title="Go back" onclick="goBack()" style="display:none;background:none;border:none;color:white;font-size:16px;cursor:pointer;opacity:0.85;padding:0;align-items:center;">&#8592;</button>
    <h1>📐 Formula Auditor</h1>
    <button id="close-btn" title="Close">✕</button>
  </div>

  <div id="cell-label">Active cell: <span id="cell-addr">—</span></div>

  <div id="formula-box" id="formula-display">Select a formula cell…</div>

  <div id="no-formula">No formula in this cell.<br/>Select a cell containing a formula.</div>

  <div id="refs-label">Referenced cells <span id="ref-count"></span></div>
  <div id="refs-list"></div>

  <div id="hint">↑ ↓ navigate &nbsp;·&nbsp; Enter to drill in &nbsp;·&nbsp; Backspace to go back &nbsp;·&nbsp; Esc to close</div>

  <script src="taskpane.js"></script>
</body>
</html>
